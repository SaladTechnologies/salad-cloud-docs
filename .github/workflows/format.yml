name: Prettier

on:
  pull_request:

jobs:
  check:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Run Prettier
        run: npx prettier "./**/*.{md,mdx}" --check
